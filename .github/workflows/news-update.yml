name: Daily News Update

on:
  schedule:
    # Run at 8am and 8pm UTC daily
    - cron: '0 8 * * *'
    - cron: '0 20 * * *'
  workflow_dispatch:

jobs:
  update-news:
    runs-on: ubuntu-latest
    steps:
      - name: Fetch latest news
        run: |
          echo "Fetching news from API..."
          curl -s -o /dev/null -w "%{http_code}" ${{ secrets.SITE_URL }}/api/news
      
      - name: Verify deck of the day
        run: |
          echo "Verifying deck of the day endpoint..."
          curl -s -o /dev/null -w "%{http_code}" ${{ secrets.SITE_URL }}/api/deck-of-the-day

  notify-discord:
    needs: update-news
    runs-on: ubuntu-latest
    if: always()
    steps:
      - name: Send Discord notification on failure
        if: needs.update-news.result == 'failure'
        run: |
          curl -X POST ${{ secrets.DISCORD_WEBHOOK }} \
            -H "Content-Type: application/json" \
            -d '{"content": "⚠️ News update failed! Check the site."}'
